<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
        href="css/admin.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>Admin Login</h1>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

    <script src="js/admin-api.js"></script>

    <script src="js/login.js"></script>

</body>

</html>
